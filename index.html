<!DOCTYPE html><html lang='es'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>After Class Loyola</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel='stylesheet' href='css/estilos.css'>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css'>
<script src="js/datos.js"></script>
<script src="js/script.js"></script>
</head><body>
<header class='hero'>
<div class='overlay'>
<div class='top'>
<img class='logo' src='img/logo-colegio.png'>
<div class='title'><h1>AFTER CLASS</h1><p>Colegio Loyola · Aprender • Crear • Compartir</p></div>
<div class='logos'><img src='img/logo-vamos-mil.png'><div class='placeholder'>LOGO</div></div>
</div>
</div></header>
<main>
<section class='areas'>
<a class='card' href='#'><i class='fa-solid fa-graduation-cap'></i><h3>ACADÉMICO</h3><p>1 actividad</p></a>
<a class='card' href='#'><i class='fa-solid fa-palette'></i><h3>ARTE</h3><p>6 actividades</p></a>
<a class='card' href='#'><i class='fa-solid fa-futbol'></i><h3>DEPORTE</h3><p>7 actividades</p></a>
<a class='card' href='#'><i class='fa-solid fa-language'></i><h3>IDIOMAS</h3><p>3 actividades</p></a>
<a class='card' href='#'><i class='fa-solid fa-chess'></i><h3>ESTRATEGIA</h3><p>3 actividades</p></a>
<a class='card' href='#'><i class='fa-solid fa-microchip'></i><h3>TECNOLOGÍA</h3><p>3 actividades</p></a>
</section>

<section id="panelActividades" style="display:none;padding:30px">
<button onclick="volverAreas()" style="padding:10px 20px;margin-bottom:20px">← Volver</button>
<h2 id="tituloArea"></h2>
<div id="listaActividades" class="areas"></div>
</section>

<script>
const mapa={
"ACADÉMICO":["Apoyo Escolar"],
"ARTE":["Banda","Teatro","Danza","Coro","Escuela de Rock","Club de títeres"],
"DEPORTE":["Defensa personal","Club Futsal Varones","Club Futsal Mujeres","Club Básquet Varones","Club Básquet Mujeres","Club Voley Varones","Club Voley Mujeres"],
"IDIOMAS":["CBA","Nivelación de ingles","Speak Up"],
"ESTRATEGIA":["Lego Serius Play","Juegos de mesa","Ajedrez"],
"TECNOLOGÍA":["Robótica","Podcast","Programación"]
};

document.querySelectorAll(".areas .card").forEach(c=>{
 c.addEventListener("click",function(e){
   e.preventDefault();
   const area=this.querySelector("h3").textContent.trim();
   mostrar(area);
 });
});

function mostrar(area){
 document.querySelector(".areas").style.display="none";
 document.getElementById("panelActividades").style.display="block";
 document.getElementById("tituloArea").textContent=area;
 const cont=document.getElementById("listaActividades");
 cont.innerHTML="";
const iconos = {
  "Apoyo Escolar":"fa-book-open",
  "Banda":"fa-music",
  "Teatro":"fa-masks-theater",
  "Danza":"fa-person-dancing",
  "Coro":"fa-microphone",
  "Escuela de Rock":"fa-guitar",
  "Club de títeres":"fa-masks-theater",
  "Defensa personal":"fa-hand-fist",
  "Club Futsal Varones":"fa-futbol",
  "Club Futsal Mujeres":"fa-futbol",
  "Club Básquet Varones":"fa-basketball",
  "Club Básquet Mujeres":"fa-basketball",
  "Club Voley Varones":"fa-volleyball",
  "Club Voley Mujeres":"fa-volleyball",
  "CBA":"fa-language",
  "Nivelación de ingles":"fa-book",
  "Speak Up":"fa-comments",
  "Lego Serius Play":"fa-cubes",
  "Juegos de mesa":"fa-dice",
  "Ajedrez":"fa-chess-knight",
  "Robótica":"fa-robot",
  "Podcast":"fa-podcast",
  "Programación":"fa-laptop-code"
};

(mapa[area]||[]).forEach(a=>{

   const card=document.createElement("a");
   card.href="#";
   card.className="card";

   const icono = iconos[a] || "fa-circle";

   card.innerHTML=
      `<i class="fa-solid ${icono}" style="font-size:40px;margin-bottom:15px;"></i>
       <h3>${a}</h3>
       <p>Ver más...</p>`;

   card.onclick=(e)=>{
      e.preventDefault();
      abrirFicha(a);
   };

   cont.appendChild(card);

});
}
function volverAreas(){
 document.querySelector(".areas").style.display="grid";
 document.getElementById("panelActividades").style.display="none";
}
</script>


<div id="modalFicha" class="modal">
  <div class="modal-box">
    <span class="cerrar" onclick="cerrarModal()">&times;</span>
    <div id="contenidoFicha"></div>
  </div>
</div>

</main>
<footer>Colegio Loyola · After Class</footer>
</body></html>
